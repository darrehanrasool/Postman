$kind: http-request
name: Get all orders
description: >-
  Retrieves all orders placed by the authenticated API client. Each client only
  sees their own orders — the `accessToken` scopes the results to the
  registering client.


  ## Endpoint


  `GET {{address}}/orders`


  Full URL: `https://simple-grocery-store-api.click/orders`


  ## Authentication


  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer
  token in the `Authorization` header.


  > Register an API client via `POST /api-clients` to obtain an `accessToken` if
  you don't have one yet.


  ## Path Variables


  None.


  ## Query Parameters


  None.


  ## Request Body


  None — the request body is not used for this GET request.


  ## Example Response


  **Status:** `200 OK`


  ```json

  [
    {
      "id": "mcW9x25FFp4Xa7ViBQ3A0",
      "created": "2024-03-15T08:30:00.000Z",
      "cartId": "s_8yzDNIZb5mJ7BgjKaEC",
      "customerName": "Dar Rehan Rasool",
      "comment": "Wallahi Amazing Product and Service Habibi pick up 5:00 am",
      "items": [
        {
          "id": 432001206,
          "productId": 1225,
          "quantity": 2
        }
      ]
    },
    {
      "id": "UK8eVRS1aUMQLbfshyyLN",
      "created": "2024-03-16T10:15:00.000Z",
      "cartId": "t_9zaENJZc6nK8ChjLbFD",
      "customerName": "Dar Rehan Rasool",
      "comment": "Pick up at 4:00 am please",
      "items": [
        {
          "id": 432001208,
          "productId": 1710,
          "quantity": 1
        }
      ]
    }
  ]

  ```


  **Status:** `200 OK` (no orders yet)


  ```json

  []

  ```


  **Status:** `401 Unauthorized` (missing or invalid token)


  ```json

  {
    "error": "Invalid bearer token."
  }

  ```


  ## Notes


  - The `{{accessToken}}` variable must be set in your active environment. Run
  "Store API Register a new API client" first if needed.

  - Orders are **scoped to the authenticated client** — you will only see orders
  created with your `accessToken`.

  - The `id` field in each order object is the `orderId` used in get, update,
  and delete order requests.

  - An empty array `[]` is returned when no orders have been placed yet — this
  is not an error.

  - Use "Store API Get a single order" to retrieve full details (including
  invoice) for a specific order.
url: "{{address}}/orders"
method: GET
body:
  type: json
  content: ""
auth:
  credentials:
    - key: token
      value: "{{accessToken}}"
  type: bearer
scripts:
  - type: afterResponse
    code: |-
      console.log("After The Response");
      pm.test("status code should be 200",()=>{
          pm.response.to.have.status(200);
      })
    language: text/javascript
  - type: beforeRequest
    code: |-
      console.log("Before The Request");
      console.clear();
    language: text/javascript
