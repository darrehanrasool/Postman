$kind: http-request
name: Modify an item in the cart
description: |-
  Partially updates an existing cart item — specifically, updates the quantity of a product already in the cart. This is a partial update (PATCH) and only the `quantity` field needs to be provided.

  ## Endpoint

  `PATCH {{address}}/carts/:cartId/items/:itemId`

  Full URL: `https://simple-grocery-store-api.click/carts/s_8yzDNIZb5mJ7BgjKaEC/items/432001206`

  ## Authentication

  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer token in the `Authorization` header.

  > Register an API client via `POST /api-clients` to obtain an `accessToken` if you don't have one yet.

  ## Path Variables

  | Variable | Type    | Required | Value in this request | Description                                                                 |
  |----------|---------|----------|-----------------------|-----------------------------------------------------------------------------|
  | `cartId` | string  | Yes      | `{{cartId}}`          | The unique cart identifier.                                                 |
  | `itemId` | integer | Yes      | `432001206`           | The unique item identifier within the cart. Obtained from `POST /carts/:cartId/items` or `GET /carts/:cartId/items`. |

  ## Query Parameters

  None.

  ## Request Body

  **Content-Type:** `application/json`

  | Field      | Type    | Required | Description                                              |
  |------------|---------|----------|----------------------------------------------------------|
  | `quantity` | integer | Yes      | The new quantity for the item. Must be a positive integer. |

  ```json
  {
    "quantity": 3
  }
  ```

  ## Example Response

  **Status:** `204 No Content`

  *(No response body — a `204` status confirms the update was successful.)*

  **Status:** `401 Unauthorized` (missing or invalid token)

  ```json
  {
    "error": "Invalid bearer token."
  }
  ```

  ## Notes

  - Unlike `PUT` (which fully replaces the item), `PATCH` only updates the fields you provide — in this case, just `quantity`.
  - A `204 No Content` response with no body is the expected success response.
  - The `{{accessToken}}` variable must be set in your active environment. Run "Store API Register a new API client" first if needed.
  - The `itemId` (`432001206`) should be replaced with the actual item ID from your cart session.
  - To change the product itself (not just the quantity), use the `PUT` endpoint ("Store API Replace an item in the cart").
url: "{{address}}/carts/:cartId/items/:itemId"
method: PATCH
pathVariables:
  cartId: "{{accessToken}}"
  itemId: "{{productResponseId}}"
body:
  type: json
  content: |-
    {
        "quantity": 4
    }
auth:
  credentials:
    token: "{{accessToken}}"
  type: bearer
scripts:
  - type: afterResponse
    code: |-
      console.log("After The Response");
      pm.test("status code should be 204",()=>{
          pm.response.to.have.status(204);
      })
    language: text/javascript
  - type: beforeRequest
    code: |-
      console.log("Before The Request");
      console.clear();
    language: text/javascript
