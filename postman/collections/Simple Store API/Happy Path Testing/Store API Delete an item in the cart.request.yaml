$kind: http-request
name: Store API Delete an item in the cart
description: |-
  Permanently removes a specific item from a shopping cart. The cart itself remains intact — only the specified item is deleted.

  ## Endpoint

  `DELETE {{address}}/carts/:cartId/items/:itemId`

  Full URL: `https://simple-grocery-store-api.click/carts/s_8yzDNIZb5mJ7BgjKaEC/items/432001206`

  ## Authentication

  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer token in the `Authorization` header.

  > Register an API client via `POST /api-clients` to obtain an `accessToken` if you don't have one yet.

  ## Path Variables

  | Variable | Type    | Required | Value in this request | Description                                                                 |
  |----------|---------|----------|-----------------------|-----------------------------------------------------------------------------|
  | `cartId` | string  | Yes      | `{{cartId}}`          | The unique cart identifier.                                                 |
  | `itemId` | integer | Yes      | `432001206`           | The unique item identifier within the cart. Note: ensure there is no leading space in the value. |

  ## Query Parameters

  None.

  ## Request Body

  None — no request body is required or accepted for DELETE requests.

  ## Example Response

  **Status:** `204 No Content`

  *(No response body — a `204` status confirms the item was successfully deleted.)*

  **Status:** `401 Unauthorized` (missing or invalid token)

  ```json
  {
    "error": "Invalid bearer token."
  }
  ```

  **Status:** `404 Not Found` (item does not exist in the cart)

  ```json
  {
    "error": "No item with id '432001206' in cart 's_8yzDNIZb5mJ7BgjKaEC'."
  }
  ```

  ## Notes

  - A `204 No Content` response with no body is the expected success response — this is standard REST behaviour for DELETE.
  - **Watch out for leading spaces** in the `itemId` path variable value (e.g., `" 432001206"` vs `"432001206"`). A leading space will cause a `404` error.
  - This operation is **irreversible** — the item cannot be restored once deleted. Re-add it using `POST /carts/:cartId/items` if needed.
  - The `{{accessToken}}` variable must be set in your active environment. Run "Store API Register a new API client" first if needed.
  - After deletion, verify the cart state with `GET /carts/:cartId/items`.
url: "{{address}}/carts/:cartId/items/:itemId"
method: DELETE
pathVariables:
  cartId: "{{cartId}}"
  itemId: "560255939"
body:
  type: json
  content: ""
auth:
  credentials:
    token: "{{accessToken}}"
  type: bearer
scripts:
  - type: afterResponse
    code: |-
      console.log("After The Response");
      pm.test("status code should be 204 ",()=>{
          pm.response.to.have.status(204);
      })
    language: text/javascript
  - type: beforeRequest
    code: |-
      console.log("Before The Request");
      console.clear();
    language: text/javascript
