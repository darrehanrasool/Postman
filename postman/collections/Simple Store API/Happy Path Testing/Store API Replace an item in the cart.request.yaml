$kind: http-request
name: Store API Replace an item in the cart
description: |-
  Fully replaces an existing cart item with a different product. Unlike PATCH (which only updates quantity), PUT replaces the entire item — allowing you to swap the product and set a new quantity in one operation.

  ## Endpoint

  `PUT {{address}}/carts/:cartId/items/:itemId`

  Full URL: `https://simple-grocery-store-api.click/carts/s_8yzDNIZb5mJ7BgjKaEC/items/432001206`

  ## Authentication

  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer token in the `Authorization` header.

  > Register an API client via `POST /api-clients` to obtain an `accessToken` if you don't have one yet.

  ## Path Variables

  | Variable | Type    | Required | Value in this request | Description                                                                 |
  |----------|---------|----------|-----------------------|-----------------------------------------------------------------------------|
  | `cartId` | string  | Yes      | `{{cartId}}`          | The unique cart identifier.                                                 |
  | `itemId` | integer | Yes      | `432001206`           | The unique item identifier within the cart. Obtained from `POST /carts/:cartId/items` or `GET /carts/:cartId/items`. |

  ## Query Parameters

  None.

  ## Request Body

  **Content-Type:** `application/json`

  | Field       | Type    | Required | Description                                                                 |
  |-------------|---------|----------|-----------------------------------------------------------------------------|
  | `productId` | integer | Yes      | The ID of the new product to replace the current item with.                 |
  | `quantity`  | integer | No       | Number of units. Defaults to `1` if omitted. Must be a positive integer.    |

  ```json
  {
    "productId": 1710,
    "quantity": 2
  }
  ```

  ## Example Response

  **Status:** `204 No Content`

  *(No response body — a `204` status confirms the replacement was successful.)*

  **Status:** `401 Unauthorized` (missing or invalid token)

  ```json
  {
    "error": "Invalid bearer token."
  }
  ```

  ## Notes

  - This is a **full replacement** — the item at `itemId` will be swapped out for the new `productId`. The `itemId` itself remains the same.
  - Use `PATCH` instead if you only want to update the quantity without changing the product.
  - A `204 No Content` response with no body is the expected success response.
  - The `{{accessToken}}` variable must be set in your active environment. Run "Store API Register a new API client" first if needed.
  - The `productId` `1710` in this example refers to a dairy product — replace it with any valid product ID from `GET /products`.
url: "{{address}}/carts/:cartId/items/:itemId"
method: PUT
pathVariables:
  cartId: "{{cartId}}"
  itemId: "852096932"
body:
  type: json
  content: |-
    {
        "productId": 3674,
        "quantity": 1
    }
auth:
  credentials:
    token: "{{accessToken}}"
  type: bearer
scripts:
  - type: afterResponse
    code: |-
      console.log("After The Response");
      pm.test("status code should be 204 ",()=>{
          pm.response.to.have.status(204);
      })
    language: text/javascript
  - type: beforeRequest
    code: |-
      console.log("Before The Request");
      console.clear();
    language: text/javascript
order: 4503515703294447
