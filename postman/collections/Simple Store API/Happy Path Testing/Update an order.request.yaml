$kind: http-request
name: Update an order
description: |-
  Partially updates an existing order using HTTP PATCH. Only the fields provided in the request body are updated — omitted fields remain unchanged. Useful for correcting a customer name or updating a delivery comment after the order has been placed.

  ## Endpoint

  `PATCH {{address}}/orders/:orderId`

  Full URL: `https://simple-grocery-store-api.click/orders/UK8eVRS1aUMQLbfshyyLN`

  ## Authentication

  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer token in the `Authorization` header.

  > You can only update orders that belong to your authenticated client.

  ## Path Variables

  | Variable  | Type   | Required | Value in this request    | Description                                                              |
  |-----------|--------|----------|--------------------------|--------------------------------------------------------------------------|
  | `orderId` | string | Yes      | `UK8eVRS1aUMQLbfshyyLN`  | The unique order identifier. Obtain from `POST /orders` or `GET /orders`. |

  ## Query Parameters

  None.

  ## Request Body

  **Content-Type:** `application/json`

  All fields are optional — include only the fields you want to update.

  | Field          | Type   | Required | Description                                                                 |
  |----------------|--------|----------|-----------------------------------------------------------------------------|
  | `customerName` | string | No       | Updated customer name for the order.                                        |
  | `comment`      | string | No       | Updated delivery or order comment (e.g., new pickup time, instructions).    |

  ```json
  {
    "customerName": "Dar Rehan Rasool",
    "comment": "Wallahi Amazing Product and Service Habibi pick up 4:00 am"
  }
  ```

  ## Example Response

  **Status:** `204 No Content` (update successful — no response body)

  **Status:** `400 Bad Request` (invalid field or malformed JSON)

  ```json
  {
    "error": "Invalid value for 'customerName'."
  }
  ```

  **Status:** `401 Unauthorized` (missing or invalid token)

  ```json
  {
    "error": "Invalid bearer token."
  }
  ```

  **Status:** `404 Not Found` (order does not exist or belongs to another client)

  ```json
  {
    "error": "No order with id 'UK8eVRS1aUMQLbfshyyLN'."
  }
  ```

  ## Notes

  - A `204 No Content` response with **no body** indicates a successful update — this is expected behavior for PATCH.
  - Only `customerName` and `comment` can be updated after an order is placed. Cart items cannot be changed post-order.
  - The `orderId` value (`UK8eVRS1aUMQLbfshyyLN`) should be replaced with an actual order ID from your session.
  - The `{{accessToken}}` variable must be set in your active environment.
  - To verify the update was applied, follow up with a `GET /orders/:orderId` request.
url: "{{address}}/orders/:orderId"
method: PATCH
pathVariables:
  - key: orderId
    value: UK8eVRS1aUMQLbfshyyLN
body:
  type: json
  content: |-
    {
        "customerName": "Dar Rehan Rasool",
        "comment":"Wallahi Amazing Product "
    }
auth:
  credentials:
    - key: token
      value: "{{accessToken}}"
  type: bearer
scripts:
  - type: afterResponse
    code: |-
      console.log("After The Response");
      pm.test("status code should be 204 ",()=>{
          pm.response.to.have.status(204);
      })
    language: text/javascript
  - type: beforeRequest
    code: |-
      console.log("Before The Request");
      console.clear();
    language: text/javascript
order: 4503599500543069
