$kind: http-request
name: Store API Create a new order
description: |-
  Places a new order by converting a shopping cart into a confirmed order. Returns a unique `orderId` for the newly created order.

  ## Endpoint

  `POST {{address}}/orders`

  Full URL: `https://simple-grocery-store-api.click/orders`

  ## Authentication

  **Bearer Token** — required. Pass the `{{accessToken}}` variable as a Bearer token in the `Authorization` header.

  > Register an API client via `POST /api-clients` to obtain an `accessToken` if you don't have one yet.

  ## Path Variables

  None.

  ## Query Parameters

  None.

  ## Request Body

  **Content-Type:** `application/json`

  | Field          | Type   | Required | Description                                                                                      |
  |----------------|--------|----------|--------------------------------------------------------------------------------------------------|
  | `cartId`       | string | Yes      | The ID of the cart to convert into an order. The cart must exist and contain at least one item.  |
  | `customerName` | string | Yes      | The name of the customer placing the order. Supports Postman dynamic variables like `{{$randomFullName}}`. |
  | `comment`      | string | No       | An optional delivery or order comment (e.g., pickup time, special instructions).                 |

  ```json
  {
    "cartId": "s_8yzDNIZb5mJ7BgjKaEC",
    "customerName": "{{$randomFullName}}",
    "comment": "Wallahi Amazing Product and Service Habibi pick up 5:00 am"
  }
  ```

  ## Example Response

  **Status:** `201 Created`

  ```json
  {
    "created": true,
    "orderId": "mcW9x25FFp4Xa7ViBQ3A0"
  }
  ```

  **Status:** `400 Bad Request` (empty cart or missing required fields)

  ```json
  {
    "error": "Cart is empty. Add items before placing an order."
  }
  ```

  **Status:** `401 Unauthorized` (missing or invalid token)

  ```json
  {
    "error": "Invalid bearer token."
  }
  ```

  ## Notes

  - **This is the final step** in the shopping workflow: Status → Products → Create Cart → Add Items → Register Client → Create Order.
  - Save the returned `orderId` as an environment variable using a test script:
    ```javascript
    const response = pm.response.json();
    pm.environment.set("orderId", response.orderId);
    ```
  - The `{{$randomFullName}}` Postman dynamic variable generates a random full name on each request send — useful for testing.
  - The `cartId` in this example (`s_8yzDNIZb5mJ7BgjKaEC`) should be replaced with your actual `{{cartId}}` variable value.
  - Once an order is created, the cart is consumed — you cannot reuse the same `cartId` for another order.
  - The `{{accessToken}}` variable must be set in your active environment.
url: '{{address}}/orders'
method: POST
body:
  type: json
  content: |-
    {
        "cartId":"s_8yzDNIZb5mJ7BgjKaEC",
        "customerName": "{{$randomFullName}}",
        "comment":"Wallahi Amazing Product and Service Habibipick up 5:00 am 🫥"
    }
auth:
  credentials:
    - key: token
      value: '{{accessToken}}'
  type: bearer
order: 4490010703497195
