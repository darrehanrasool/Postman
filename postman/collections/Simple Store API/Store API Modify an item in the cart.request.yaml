$kind: http-request
name: Store API Modify an item in the cart
url: "{{address}}/carts/:cartId/items/:itemId"
method: PATCH
pathVariables:
  - key: cartId
    value: "{{cartId}}"
  - key: itemId
    value: "432001206"
body:
  type: json
  content: |-
    {
        "quantity": 3
    }
auth:
  credentials:
    - key: token
      value: "{{accessToken}}"
  type: bearer
order: 4482341785174366
