$kind: http-request
name: Store API Replace an item in the cart
url: "{{address}}/carts/:cartId/items/:itemId"
method: PUT
pathVariables:
  - key: cartId
    value: "{{cartId}}"
  - key: itemId
    value: "432001206"
body:
  type: json
  content: |-
    {
        "productId": 1710,
        "quantity": 2
    }
auth:
  credentials:
    - key: token
      value: "{{accessToken}}"
  type: bearer
order: 4483680042576095
